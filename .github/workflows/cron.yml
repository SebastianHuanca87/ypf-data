name: Automatizacion Surtidores YPF
on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Clonar repositorio
        uses: actions/checkout@v3

      - name: Configurar entorno Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Instalar modulo de red
        run: pip install requests

      - name: Ejecutar Subagente
        run: python extraer.py

      - name: Sincronizar archivo en la nube
        run: |
          git config --global user.name "Subagente Logistico"
          git config --global user.email "logistica@actions.com"
          git add precios.json
          git commit -m "Actualizacion de telemetria base" || echo "Sin cambios detectados en los precios de hoy"
          git push origin HEAD:main
